version: '3.8'

services:
  # MongoDB Primary Node (Replica Set)
  mongodb:
    image: mongo:7.0
    container_name: sentinel-net-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb_secure_password_change_me
      MONGO_INITDB_DATABASE: sentinel_net
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    command: --replSet rs0 --bind_ip_all
    networks:
      - sentinel-net
    healthcheck:
      test: |
        mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Express (Admin UI - Optional)
  mongo-express:
    image: mongo-express:latest
    container_name: sentinel-net-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongodb_secure_password_change_me
      ME_CONFIG_MONGODB_URL: mongodb://admin:mongodb_secure_password_change_me@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sentinel-net
    profiles:
      - debug  # Run with: docker-compose --profile debug up

  # FastAPI Backend
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-net-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:mongodb_secure_password_change_me@mongodb:27017/?authSource=admin
      MONGODB_DATABASE: sentinel_net
      MONGODB_MAX_POOL_SIZE: 50
      MONGODB_MIN_POOL_SIZE: 10
      MONGODB_ENABLE_TRANSACTIONS: "true"
      FASTAPI_ENV: development
      FASTAPI_DEBUG: "true"
    volumes:
      - ./:/app
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sentinel-net
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - backend

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  sentinel-net:
    driver: bridge

# Usage:
# Development (MongoDB only):
#   docker-compose up -d mongodb
#
# With Admin UI:
#   docker-compose --profile debug up -d
#
# Full stack:
#   docker-compose --profile backend --profile debug up -d
#
# Cleanup:
#   docker-compose down -v
