name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-channels:
    name: Notify Channels
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: ${{ always() }}
    steps:
      - name: Send workflow result to Discord/Slack webhooks
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BUILD_STATUS: ${{ needs.build.result }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"

          STATUS="success"
          if [ "$BUILD_STATUS" != "success" ] || [ "$DEPLOY_STATUS" != "success" ]; then
            STATUS="failure"
          fi

          MESSAGE="Deploy $STATUS for $REPO on $BRANCH by $ACTOR | build=$BUILD_STATUS deploy=$DEPLOY_STATUS | page=$PAGE_URL | run=$RUN_URL"

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            discord_payload=$(cat <<EOF
          {
            "content": "$MESSAGE"
          }
          EOF
          )
            curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$discord_payload"
          else
            echo "DISCORD_WEBHOOK_URL not set. Skipping Discord notification."
          fi

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            slack_payload=$(cat <<EOF
          {
            "text": "$MESSAGE"
          }
          EOF
          )
            curl -sS -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$slack_payload"
          else
            echo "SLACK_WEBHOOK_URL not set. Skipping Slack notification."
          fi
