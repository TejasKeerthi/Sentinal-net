name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Deploy Notifications
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Build notification payload
        id: payload
        run: |
          STATUS="${{ needs.deploy.result }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          PAGE_URL="${{ needs.deploy.outputs.page_url }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          ICON="✅"
          if [ "$STATUS" != "success" ]; then ICON="❌"; fi

          echo "text=${ICON} Sentinel-Net deploy ${STATUS}" >> "$GITHUB_OUTPUT"
          echo "details=Branch: ${BRANCH} | Actor: ${ACTOR} | Page: ${PAGE_URL:-N/A} | Run: ${RUN_URL}" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEXT: ${{ steps.payload.outputs.text }}
          DETAILS: ${{ steps.payload.outputs.details }}
        run: |
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"content\":\"${TEXT}\\n${DETAILS}\"}" >/dev/null

      - name: Notify Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEXT: ${{ steps.payload.outputs.text }}
          DETAILS: ${{ steps.payload.outputs.details }}
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"${TEXT}\\n${DETAILS}\"}" >/dev/null
